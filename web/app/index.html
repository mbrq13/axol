<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />

    <!-- Critical inline styles so the first paint is always the dark theme
         with a loading spinner — never a black/white flash while the JS,
         CSS, and fonts download. -->
    <style>
      html,
      body {
        margin: 0;
        background-color: #121212;
        color: #fafafa;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
      }
      #root {
        min-height: 100vh;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #boot span {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.12);
        border-top-color: rgba(239, 244, 131, 0.85);
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts without blocking first paint; fall back to system fonts. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400..700&family=Inter:wght@400..700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Geist:wght@400..700&family=Inter:wght@400..700&display=swap"
      />
    </noscript>

    <title>Almond Axol</title>
  </head>
  <body>
    <div id="root">
      <div id="boot"><span></span></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
